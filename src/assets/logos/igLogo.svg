<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="250" height="250">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A57314" />
      <stop offset="25%" stop-color="#FDF1A9" />
      <stop offset="50%" stop-color="#C5932E" />
      <stop offset="75%" stop-color="#EED575" />
      <stop offset="100%" stop-color="#8B5E05" />
    </linearGradient>
    
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g filter="url(#dropShadow)">
    <rect x="150" y="150" width="724" height="724" rx="200" ry="200" fill="none" stroke="url(#goldGradient)" stroke-width="85" />
    <circle cx="512" cy="512" r="180" fill="none" stroke="url(#goldGradient)" stroke-width="85" />
    <circle cx="760" cy="264" r="50" fill="url(#goldGradient)" />
